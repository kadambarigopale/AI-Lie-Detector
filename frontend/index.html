<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lie Detector - Deep Text Analysis</title>
    <meta name="description" content="Discover the truth behind statements using our AI-powered lie detection system.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glow-blob top-left"></div>
    <div class="glow-blob bottom-right"></div>

    <main class="container">
        <header>
            <div class="logo-container">
                <div class="pulse-ring"></div>
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-fingerprint">
                    <path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4" />
                    <path d="M14 13.12c0 2.38 0 6.38-1 8.88" />
                    <path d="M17.29 21.02c.12-.6.43-2.3.5-3.02" />
                    <path d="M2 12a10 10 0 0 1 18-6" />
                    <path d="M2 16h.01" />
                    <path d="M21.8 16c.2-2 .131-5.354 0-6" />
                    <path d="M5 19.5C5.5 18 6 15 6 12a6 6 0 0 1 .34-2" />
                    <path d="M8.65 22c.21-.66.45-1.32.57-2" />
                    <path d="M9 6.8a6 6 0 0 1 9 5.2v2" />
                </svg>
            </div>
            <h1>AI Lie <span class="accent-gradient">Detector</span></h1>
            <p>Analyze linguistic patterns to detect deception with machine learning.</p>
        </header>

        <section class="analysis-panel glass-card">
            <form id="analysisForm">
                <div class="input-controls">
                    <label for="textIn">Statement Analysis</label>
                </div>
                <textarea id="textIn" required
                    placeholder="Paste or type a review, comment or statement here to verify its authenticity..."></textarea>

                <div class="actions">
                    <button type="submit" id="analyzeBtn" class="btn-primary">
                        <a href="dashboard.html" span class="btn-text">Detect Deception</span>
                        <div class="spinner hidden" id="loadingSpinner"></div>
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('analysisForm');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const btnText = document.querySelector('.btn-text');
            const loadingSpinner = document.getElementById('loadingSpinner');

            // API endpoint - dynamically set based on environment
            const API_URL = (window.location.port === '8000') ? '/predict' : 'http://localhost:8000/predict';

            form.onsubmit = async (e) => {
                e.preventDefault();

                const text = document.getElementById('textIn').value.trim();
                if (!text) return;

                // Show loading state
                analyzeBtn.disabled = true;
                btnText.classList.add('hidden');
                loadingSpinner.classList.remove('hidden');

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text })
                    });

                    if (!response.ok) throw new Error("Server error");

                    const data = await response.json();

                    // SAVE DATA and REDIRECT to dashboard.html
                    sessionStorage.setItem('lastAnalysis', JSON.stringify(data));
                    sessionStorage.setItem('lastText', text);

                    console.log("Success! Navigating to results page...");
                    window.location.href = 'dashboard.html';

                } catch (error) {
                    alert("Analysis Failed. Please make sure the backend is running at http://localhost:8000");
                    analyzeBtn.disabled = false;
                    btnText.classList.remove('hidden');
                    loadingSpinner.classList.add('hidden');
                }
            };
        });
    </script>
</body>

</html>
